#!/bin/bash
#-----------------------------------------------------------------------
#        Author: Aamnah
#          Link: https://aamnah.com
#       Version: 0.1.0
#          Date: 2018-08-16
#       Lastmod: 2024-04-24
#   Description: Lasik Tmux Theme (matches Lasik VSCode theme)
#         Theme: https://marketplace.visualstudio.com/items?itemName=AmnaAkram.lasik
# Compatibility: Debian, Ubuntu, Armbian, macOS
#-----------------------------------------------------------------------

# There are examples in `/usr/share/doc/tmux/examples/`

# VARIABLES
# COLORS: Lasik VSCode Theme palette
# ---------------------------------------------------------------------
# Background tones (darkest → lightest)
BG_DARK='#01030a'         # editor bg (near-black navy)
BG_DARKER='#010102'       # titlebar bg (almost pure black)
BG_STATUS='#090b10'       # status bar bg (one step up from BG_DARK)
BORDER='#2b2b2b'          # neutral dark border

# Foreground tones
FG='#cccccc'              # primary text
FG_MUTED='#9d9d9d'        # dimmed/inactive text

# Accent colors (from Lasik syntax highlighting)
LAVENDER='#a8bcfc'        # theme signature — icons, active elements
BLUE='#4daafc'            # links
PINK='#e95678'            # variables / tags
PEACH='#fab795'           # strings
TEAL='#02bbcc'            # function names
PURPLE='#d993ff'          # keywords
RED='#f85149'             # errors

# CUSTOM STYLES
# Set styles here, saves me scrolling down down down
# FG first, BG second. Be consistent
WINDOW_FG="${FG_MUTED}"
WINDOW_BG="${BG_DARK}"
WINDOW_ACTIVE_FG="${FG}"
WINDOW_ACTIVE_BG="${BG_DARK}"

PANE_BORDER_FG="${BORDER}"
PANE_BORDER_BG="${BG_DARK}"
PANE_ACTIVE_BORDER_FG="${LAVENDER}"
PANE_ACTIVE_BORDER_BG="${BG_DARK}"

STATUS_FG="${FG}"
STATUS_BG="${BG_STATUS}"
STATUS_LEFT_FG="${BG_DARKER}"
STATUS_LEFT_BG="${PINK}"
STATUS_RIGHT_FG="${BG_DARKER}"
STATUS_RIGHT_BG="${LAVENDER}"

WINDOW_STATUS_FG="${FG_MUTED}"
WINDOW_STATUS_BG="${BG_STATUS}"
WINDOW_STATUS_CURRENT_FG="${BG_DARKER}"
WINDOW_STATUS_CURRENT_BG="${LAVENDER}"

# CUSTOM FORMATS
WINDOW_STATUS_SEPARATOR="  "
WINDOW_STATUS_FORMAT=" #I. #W#F "
WINDOW_STATUS_CURRENT_FORMAT=" #I. #W#F "
STATUS_RIGHT_FORMAT=" @#H %e %h %H:%M "
STATUS_LEFT_FORMAT="[#S] "


# DEFAULTS
# ---------------------------------------------------------------
# 256 colors
# set -g default-terminal "tmux-256color" # doesn't work on macOS
set -g default-terminal "xterm-256color"
set -ag terminal-overrides ",xterm-kitty:RGB"

# auto-reload .tmux.conf and install TPM plugins with `<prefix> r`
# bind r source-file ~/.tmux.conf \; display "Reloaded ~/.tmux.conf"
# sun-shell exit 0 silently if TPM not installed
bind r source-file ~/.tmux.conf \; run-shell "[ -x ~/.tmux/plugins/tpm/bin/install_plugins ] && ~/.tmux/plugins/tpm/bin/install_plugins" \; display "Reloaded conf + installed plugins"

# Allow the mouse to resize panes, switch between panes and windows etc.
# Default is `off`
set -g mouse on

# start window panes at 1, not 0
# because hitting 0 at a full-size keyboard is hard, numbers start at 1
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Splits open in the pane's current directory (default uses $HOME)
bind '"' split-window -v -c "#{pane_current_path}"
bind %   split-window -h -c "#{pane_current_path}"
bind c   new-window      -c "#{pane_current_path}"


# FOMAT
# ---------------------------------------------------------------
#H	Hostname of local host
#h	Hostname of local host (no domain name)
#D	Unique pane ID
#P	Index of pane
#T	Title of pane
#S	Name of session
#F	Window flags
#I	Index of window
#W	Name of window

# THEME
# ---------------------------------------------------------------
# Possible color values:
#		Hexadecimal ('#ffffff', all 6 digits, no #FFF shorthand, needs to be in commas)
#		Terminal colors (black, red, green, yellow, blue, magenta, cyan, white)
#		256 colour set: colour0 till colour256

# Possible Attribute values:
# 	none, bright, bold, dim, underscore, blink, reverse, hidden, italics, strikethrough
# to disable the attribute, prefix with `no`. e.g. noreverse, noitalics etc.

# These may be ‘bg=colour’ to set the background colour,
# ‘fg=colour’ to set the foreground colour

# Examples are:
#	fg=yellow,bold,underscore,blink
# bg=black,fg=default,noreverse

# STYLES
#pane-border-style
#pane-active-border-style
#window-style
#window-active-style
#window-status-style
#window-status-current-style
#window-status-activity-style
#window-status-last-style
#status-style
#status-left-style
#status-right-style
#message-style
#mode-style

# Panes
#-----------------------------------------------------------------------
# set inactive/active window styles
# style = comma-separated list of characteristics to be specified.

# Inactive Pane
set -g window-style "fg=${WINDOW_FG}, bg=${WINDOW_BG}"

# Active Pane
set -g window-active-style "fg=${WINDOW_ACTIVE_FG}, bg=${WINDOW_ACTIVE_BG}"

# set pane border colors
set -g pane-border-style "fg=${PANE_BORDER_FG}, bg=${PANE_BORDER_BG}"

# variable substitution does not work in this style of style declaration:
set -g pane-active-border-style "fg=${PANE_ACTIVE_BORDER_FG}, bg=${PANE_ACTIVE_BORDER_BG}"
# !important - need to use double quotes "" for variable substitution

# Status Bar
#-----------------------------------------------------------------------
# The status bar that shows at the bottom.
# You can style left/right separately

# Status Bar
set -g status-style "fg=${STATUS_FG}, bg=${STATUS_BG}"

# Status Bar (Left)
set -g status-left-style "fg=${STATUS_LEFT_FG}, bg=${STATUS_LEFT_BG}"

# Status Bar (Right)
set -g status-right-style "fg=${STATUS_RIGHT_FG}, bg=${STATUS_RIGHT_BG}"

# Align the Window names
# status-justify [left | centre | right]
# Set the position of the window list component of the status line: left, centre or right justified.
set -g status-justify left

# Window title in Status bar
set -g window-status-style "fg=${WINDOW_STATUS_FG}, bg=${WINDOW_STATUS_BG}"

## Current Window in Status Bar
#-----------------------------------------------------------------------
# Set status line style for the currently active window
# Highlights the current window in the status bar

set -g window-status-current-style "fg=${WINDOW_STATUS_CURRENT_FG}, bg=${WINDOW_STATUS_CURRENT_BG}"

## Separator between Window titles in Status Bar
#-----------------------------------------------------------------------
# window-status-separator string
# Sets the separator drawn between windows in the status line. The default is a single space character.
# NOTE: this separator shows _after_ the window title. It'll still show even if there is only one window. e.g. `[0:bash]* ---` (where --- is the separator)
set -g window-status-separator ${WINDOW_STATUS_SEPARATOR}

## Listing format for Window names in Status Bar
#-----------------------------------------------------------------------
# window-status-format string
# Set the format in which the window is displayed in the status line window list. See the status-left option for details of special character sequences available. The default is ‘#I:#W#F’.

# All windows
set -g window-status-format ${WINDOW_STATUS_FORMAT}

# Current window
set -g window-status-current-format ${WINDOW_STATUS_CURRENT_FORMAT}

## Status Bar (Right) Format
#-----------------------------------------------------------------------
# status-right string
# Display string to the right of the status line. By default, the current pane title in double quotes, the date and the time are shown. As with status-left, string will be passed to strftime(3) and character pairs are replaced.
# Default is `\"#H\" %R %d-%h-%y`
set -g status-right ${STATUS_RIGHT_FORMAT}

# Default is `#S` (name of current Session)
set -g status-left ${STATUS_LEFT_FORMAT}



# LINKS
#-----------------------------------------------------------------------
# Tmux Manual - http://man7.org/linux/man-pages/man1/tmux.1.html
# Time Variables - https://man.openbsd.org/strftime.3
