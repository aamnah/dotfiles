# UI
font_size        12.0
font_family      Hasklug Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto

# Theme
include themes/catppuccin-mocha.conf


# Let shift+drag select text even when tmux has mouse mode on.
# Without these, kitty forwards the click to tmux instead of selecting.
mouse_map shift+left press       grabbed,ungrabbed mouse_selection normal
mouse_map shift+left release     grabbed,ungrabbed mouse_selection end
mouse_map shift+left doublepress grabbed,ungrabbed mouse_selection word
mouse_map shift+left triplepress grabbed,ungrabbed mouse_selection line
