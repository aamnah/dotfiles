#-----------------------------------------------------------------------

foreground              #ffffff  # WHITE
background              #01030a  # OBSIDIAN

selection_foreground    #ffffff  # WHITE
selection_background    #3c476c  # SLATE

cursor                  #ffffff  # WHITE
cursor_text_color       #01030a  # OBSIDIAN

# The basic 16 terminal colors
color0                  #3c476c  # SLATE
color1                  #d24e6d  # RED
color2                  #a0c38f  # GREEN
color3                  #ffe2a3  # YELLOW
color4                  #569cd6  # BLUE
color5                  #c175ea  # MAUVE
color6                  #02bbcc  # SAPPHIRE
color7                  #d1dafa  # LAVENDER

# Bright colors, mapped from Konsole *Intense values
color8                  #2a324b  # SLATE_INTENSE
color9                  #bb3050  # RED_INTENSE
color10                 #81b668  # GREEN_INTENSE
color11                 #ffd370  # YELLOW_INTENSE
color12                 #3184c9  # BLUE_INTENSE
color13                 #ae49e4  # MAUVE_INTENSE
color14                 #01747e  # SAPPHIRE_INTENSE
color15                 #e8ecfd  # LAVENDER_INTENSE

# Optional UI colors
tab_bar_background      #01030a  # OBSIDIAN
active_tab_background   #3c476c  # SLATE
active_tab_foreground   #ffffff  # WHITE
inactive_tab_background #2a324b  # SLATE_INTENSE
inactive_tab_foreground #d1dafa  # LAVENDER

url_color               #02bbcc  # SAPPHIRE
