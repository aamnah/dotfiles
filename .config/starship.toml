# Starship prompt config
# Docs: https://starship.rs/config/
# Port of OMZ "candy" theme:
#   user@host [HH:MM:SS] [~/path] [branch] *
#   -> %

add_newline = true

format = """$username$hostname $time $directory $git_branch$git_status
[->](blue) $character """

[username]
show_always = true
style_user = "bold green"
style_root = "bold green"
format = "[$user]($style)"

[hostname]
ssh_only = false
style = "bold green"
format = "[@$hostname]($style)"

[time]
disabled = false
style = "blue"
format = "[\\[$time\\]]($style)"
time_format = "%T"

[directory]
style = "white"
truncation_length = 3
truncate_to_repo = false
format = "[\\[$path\\]]($style)"

[git_branch]
symbol = ""
style = "green"
format = "[\\[$branch\\]]($style)"

[git_status]
style = "red"
format = "[$all_status$ahead_behind]($style)"
modified = " *"
staged = " +"
untracked = " ?"
conflicted = " !"

[character]
success_symbol = "[%](bold blue)"
error_symbol = "[%](bold red)"
