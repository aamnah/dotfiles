# Starship prompt config
# Docs: https://starship.rs/config/
# Adapted from Kali Linux's default zsh prompt:
#   ┌──(user㉿host)-[~/path]-(branch)
#   └─$
# └─$ turns red on non-zero exit status (Kali behaviour).

add_newline = true

format = """[┌──\\[](green)$directory[\\]](green)$git_branch$git_status
$character"""

[username]
show_always = true
style_user = "green"
style_root = "red"
format = "[$user]($style)"

[hostname]
ssh_only = false
style = "green"
format = "[$hostname]($style)"

[directory]
style = "blue"
truncate_to_repo = false
truncation_length = 3
format = "[$path]($style)"

[git_branch]
symbol = ""
format = "[ \\(](blue)[$branch](green)[\\)](blue)"

[git_status]
style = "yellow"
format = "[$all_status$ahead_behind]($style)"
modified = " *"
staged = " +"
untracked = " ?"
conflicted = " !"

[time]
disabled = true

[character]
success_symbol = "[└─](green)[\\$ ](blue)"
error_symbol = "[└─](green)[\\$ ](red)"
