#!/bin/bash
#-----------------------------------------------------------------------
#        Author: Aamnah
#          Link: https://aamnah.com
#       Version: 0.1.0
#          Date: 2024-04-24
#       Lastmod: 2024-04-25
#   Description: Global tmux configuration
# Compatibility: Debian, Ubuntu, Armbian, macOS
#          File: ~/.config/tmux/tmux.conf
#-----------------------------------------------------------------------

# DEFAULTS
# ---------------------------------------------------------------
# 256 colors
# set -g default-terminal "tmux-256color" # doesn't work on macOS
set -g default-terminal "xterm-256color"
set -ag terminal-overrides ",xterm-kitty:RGB"

# set mouse support ON
set -g mouse on

# Hot reload tmux config and install TPM plugins with `<prefix> r`
# bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded ~/.config/tmux/tmux.conf"
# run-shell exits 0 silently if TPM is not installed
bind r source-file ~/.config/tmux/tmux.conf \; run-shell "[ -x ~/.config/tmux/plugins/tpm/bin/install_plugins ] && ~/.config/tmux/plugins/tpm/bin/install_plugins" \; display "Reloaded conf + installed plugins"

# start window panes at 1, not 0
# because hitting 0 at a full-size keyboard is hard, numbers start at 1
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Splits open in the pane's current directory (default uses $HOME)
bind '"' split-window -v -c "#{pane_current_path}"
bind %   split-window -h -c "#{pane_current_path}"
bind c   new-window      -c "#{pane_current_path}"

# Pi coding agent: extended-keys should be enabled 
# for Modified Enter keys to work
set -g extended-keys on

# TPM is installed by install.sh. Manual install:
# git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm

# TPM PLUGINS
# ---------------------------------------------------------------
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins/'
set -g @plugin 'tmux-plugins/tpm'

# List of plugins
# REMEMBER to install plugins with: prefix + i
set -g @plugin 'xamut/tmux-weather'
set -g @plugin 'tmux-plugins/tmux-cpu'

# Plugin options
# ---------------------------------------------------------------
# xamut/tmux-weather
set -g @tmux-weather-location "Jyvaskyla"
set -g @tmux-weather-format "+%t+%c"   # temp + condition icon

# DEFAULT THEME
# ---------------------------------------------------------------
# Themes are source-able tmux config files. Switch manually with e.g.:
#   tmux source-file ~/.config/tmux/lasik.tmux
#   tmux source-file ~/.config/tmux/catppuccin.tmux
source-file ~/.config/tmux/catppuccin.tmux

# INITIALIZE TPM
# ---------------------------------------------------------------
# Initialize TMUX plugin manager
# Put this at the bottom of ~/.config/tmux/tmux.conf:
run '~/.config/tmux/plugins/tpm/tpm'
